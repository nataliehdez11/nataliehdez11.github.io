{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="custom-nav">
        <a class="site-title" href="{{ base_path }}/">{{ site.title }}</a>

        <button class="mobile-menu-button" onclick="document.body.classList.toggle('mobile-menu-open')" aria-label="Toggle menu">
          ☰
        </button>

        <ul class="nav-links">
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li>
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</div>
